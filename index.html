<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión de Pastas</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <h1 id="app-title">Inicio</h1>
        <button id="btn-sync" class="icon-btn"><span class="material-icons-round">sync</span></button>
    </header>

    <main id="app-content"></main>

    <button id="fab-add" class="fab"><span class="material-icons-round">add</span></button>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="home">
            <span class="material-icons-round">dashboard</span>
            <span>Inicio</span>
        </button>
        <button class="nav-item" data-view="ventas">
            <span class="material-icons-round">point_of_sale</span>
            <span>Ventas</span>
        </button>
        <button class="nav-item" data-view="productos">
            <span class="material-icons-round">inventory_2</span>
            <span>Stock</span>
        </button>
        <button class="nav-item" data-view="clientes">
            <span class="material-icons-round">people</span>
            <span>Clientes</span>
        </button>
        <button class="nav-item" data-view="pedidos">
            <span class="material-icons-round">assignment</span>
            <span>Pedidos</span>
        </button>
    </nav>

    <div id="modal-container" class="modal hidden">
        <div class="modal-content">
            <header class="modal-header">
                <h2 id="modal-title">Título</h2>
                <button id="btn-close-modal" class="icon-btn"><span class="material-icons-round">close</span></button>
            </header>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/whatsapp.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
